<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pacientes - Odontoguia</title>

<!-- jsPDF CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f0f4f8;
}

header {
    background: #0077b6;
    color: white;
    padding: 20px;
    text-align: center;
}

.container {
    max-width: 1100px;
    margin: 30px auto;
    padding: 20px;
}

.card {
    background: white;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.08);
    margin-bottom: 30px;
}

h2 {
    margin-top: 0;
    color: #0077b6;
}

.form-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 15px;
}

input, select, textarea {
    width: 100%;
    padding: 10px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

textarea {
    resize: vertical;
}

button {
    background: #0077b6;
    color: white;
    border: none;
    padding: 10px 15px;
    border-radius: 6px;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    background: #005f8b;
}

.btn-secondary {
    background: #6c757d;
}

.patient-list {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 15px;
}

.patient-card {
    background: #ffffff;
    padding: 15px;
    border-radius: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.05);
}

.patient-card h3 {
    margin: 0 0 5px;
    color: #0077b6;
}

.actions {
    margin-top: 10px;
    display: flex;
    gap: 10px;
}

.back {
    display: inline-block;
    margin-bottom: 20px;
    text-decoration: none;
    color: #0077b6;
    font-weight: bold;
}
</style>
</head>

<body>

<header>
    <h1>Gerenciamento de Pacientes</h1>
</header>

<div class="container">

<a href="index.html" class="back">← Voltar para Página Principal</a>

<div class="card">
    <h2>Cadastrar Paciente</h2>
    <div class="form-grid">
        <input type="text" id="name" placeholder="Nome">
        <input type="number" id="age" placeholder="Idade">
        <select id="gender">
            <option value="">Sexo</option>
            <option>Homem</option>
            <option>Mulher</option>
        </select>
        <input type="number" id="weight" placeholder="Peso (kg)">
        <input type="date" id="date">
        <textarea id="complaints" placeholder="Reclamações"></textarea>
        <textarea id="history" placeholder="Histórico Médico"></textarea>
        <textarea id="notes" placeholder="Anotações"></textarea>
    </div>
    <br>
    <button onclick="savePatient(true)">Salvar e Baixar PDF</button>
</div>

<div class="card">
    <h2>Pacientes Salvos</h2>
    <div class="patient-list" id="patientList"></div>
</div>

</div>

<script>
const { jsPDF } = window.jspdf;
let patients = JSON.parse(localStorage.getItem("patients")) || [];

function savePatient(downloadPDF = false) {
    const patient = {
        name: name.value,
        age: age.value,
        gender: gender.value,
        weight: weight.value,
        date: date.value,
        complaints: complaints.value,
        history: history.value,
        notes: notes.value
    };

    if (!patient.name) {
        alert("Informe o nome do paciente.");
        return;
    }

    patients.push(patient);
    localStorage.setItem("patients", JSON.stringify(patients));

    if (downloadPDF) generatePDF(patient);

    clearForm();
    renderPatients();
}

function generatePDF(p) {
    const doc = new jsPDF();

    doc.setFontSize(16);
    doc.text("Ficha do Paciente - Odontoguia", 20, 20);

    doc.setFontSize(11);
    let y = 35;

    const addLine = (label, value) => {
        doc.text(`${label}: ${value || "-"}`, 20, y);
        y += 8;
    };

    addLine("Nome", p.name);
    addLine("Idade", p.age);
    addLine("Sexo", p.gender);
    addLine("Peso", p.weight);
    addLine("Data da Consulta", p.date);
    addLine("Reclamações", p.complaints);
    addLine("Histórico Médico", p.history);
    addLine("Anotações", p.notes);

    doc.save(`Paciente_${p.name.replace(/\s+/g, "_")}.pdf`);
}

function renderPatients() {
    const list = document.getElementById("patientList");
    list.innerHTML = "";

    patients.forEach(p => {
        list.innerHTML += `
        <div class="patient-card">
            <h3>${p.name}</h3>
            <p><strong>Consulta:</strong> ${p.date || "-"}</p>
        </div>
        `;
    });
}

function clearForm() {
    document.querySelectorAll("input, textarea, select").forEach(el => el.value = "");
}

renderPatients();
</script>

</body>
</html>
