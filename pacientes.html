<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pacientes - Odontoguia</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f0f4f8;
}

header {
    background: #0077b6;
    color: white;
    padding: 20px;
    text-align: center;
}

.container {
    max-width: 1100px;
    margin: 30px auto;
    padding: 20px;
}

.card {
    background: white;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.08);
    margin-bottom: 30px;
}

h2 {
    margin-top: 0;
    color: #0077b6;
}

.form-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 15px;
}

input, select, textarea {
    width: 100%;
    padding: 10px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

textarea {
    resize: vertical;
}

button {
    background: #0077b6;
    color: white;
    border: none;
    padding: 10px 15px;
    border-radius: 6px;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    background: #005f8b;
}

.btn-danger {
    background: #c1121f;
}

.btn-danger:hover {
    background: #9b0e18;
}

.top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 15px;
    flex-wrap: wrap;
    gap: 10px;
}

.search {
    padding: 8px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

.patient-list {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 15px;
}

.patient-card {
    background: #ffffff;
    padding: 15px;
    border-radius: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    transition: 0.2s;
}

.patient-card:hover {
    transform: translateY(-4px);
}

.patient-card h3 {
    margin: 0 0 5px 0;
    color: #0077b6;
}

.patient-card p {
    margin: 4px 0;
    font-size: 0.9em;
}

.actions {
    margin-top: 10px;
    display: flex;
    gap: 10px;
}

.back {
    display: inline-block;
    margin-bottom: 20px;
    text-decoration: none;
    color: #0077b6;
    font-weight: bold;
}
</style>
</head>

<body>

<header>
    <h1>Gerenciamento de Pacientes</h1>
</header>

<div class="container">

<a href="index.html" class="back">← Voltar para Página Principal</a>

<div class="card">
    <h2>Cadastrar / Editar Paciente</h2>
    <div class="form-grid">
        <input type="text" id="name" placeholder="Nome">
        <input type="number" id="age" placeholder="Idade">
        <select id="gender">
            <option value="">Sexo</option>
            <option>Homem</option>
            <option>Mulher</option>
        </select>
        <input type="number" id="weight" placeholder="Peso (kg)">
        <input type="date" id="date">
        <textarea id="complaints" placeholder="Reclamações"></textarea>
        <textarea id="history" placeholder="Histórico Médico"></textarea>
        <textarea id="notes" placeholder="Anotações"></textarea>
    </div>
    <br>
    <button onclick="savePatient()">Salvar Paciente</button>
</div>

<div class="card">
    <div class="top-bar">
        <h2>Pacientes Cadastrados</h2>
        <input type="text" id="search" class="search" placeholder="Pesquisar..." onkeyup="renderPatients()">
    </div>
    <div class="patient-list" id="patientList"></div>
</div>

</div>

<script>
let patients = JSON.parse(localStorage.getItem("patients")) || [];
let editingIndex = null;

function savePatient() {
    const patient = {
        name: document.getElementById("name").value,
        age: document.getElementById("age").value,
        gender: document.getElementById("gender").value,
        weight: document.getElementById("weight").value,
        date: document.getElementById("date").value,
        complaints: document.getElementById("complaints").value,
        history: document.getElementById("history").value,
        notes: document.getElementById("notes").value
    };

    if (!patient.name) {
        alert("Digite o nome do paciente.");
        return;
    }

    if (editingIndex !== null) {
        patients[editingIndex] = patient;
        editingIndex = null;
    } else {
        patients.push(patient);
    }

    localStorage.setItem("patients", JSON.stringify(patients));
    clearForm();
    renderPatients();
}

function renderPatients() {
    const search = document.getElementById("search").value.toLowerCase();
    const list = document.getElementById("patientList");
    list.innerHTML = "";

    patients.forEach((p, index) => {
        if (!p.name.toLowerCase().includes(search)) return;

        list.innerHTML += `
        <div class="patient-card">
            <h3>${p.name}</h3>
            <p><strong>Idade:</strong> ${p.age}</p>
            <p><strong>Sexo:</strong> ${p.gender}</p>
            <p><strong>Consulta:</strong> ${p.date}</p>
            <div class="actions">
                <button onclick="editPatient(${index})">Editar</button>
                <button class="btn-danger" onclick="deletePatient(${index})">Excluir</button>
            </div>
        </div>
        `;
    });
}

function editPatient(index) {
    const p = patients[index];
    document.getElementById("name").value = p.name;
    document.getElementById("age").value = p.age;
    document.getElementById("gender").value = p.gender;
    document.getElementById("weight").value = p.weight;
    document.getElementById("date").value = p.date;
    document.getElementById("complaints").value = p.complaints;
    document.getElementById("history").value = p.history;
    document.getElementById("notes").value = p.notes;
    editingIndex = index;
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function deletePatient(index) {
    if (confirm("Deseja excluir este paciente?")) {
        patients.splice(index, 1);
        localStorage.setItem("patients", JSON.stringify(patients));
        renderPatients();
    }
}

function clearForm() {
    document.querySelectorAll("input, textarea, select").forEach(el => el.value = "");
}

renderPatients();
</script>

</body>
</html>
